<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天有人一起吃饭吗~</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://jgbvnsthoniroetieifo.supabase.co" crossorigin />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <div class="top-row">
      <header class="hero">
        <h1>今天有人一起吃饭吗~</h1>
        <p>本周工作日打卡，看看今天谁可以一起吃饭。</p>
      </header>

      <section class="user-panel card">
        <div id="profileDisplay" class="profile-display hidden">
          <div id="activeUserBox" class="active-user"></div>
          <div class="profile-actions">
            <button id="switchProfileBtn" class="btn soft" type="button">切换用户</button>
            <button id="editProfileBtn" class="btn soft" type="button">修改</button>
          </div>
        </div>

        <div id="profileEditor" class="profile-editor">
          <h2 id="profileEditorTitle">登录或创建用户</h2>
          <p id="profileHelp" class="profile-help">输入已有用户名会恢复原账户；输入新名字会创建用户。</p>
          <div class="profile-editor-row">
            <label>
              用户名
              <input id="nameInput" type="text" maxlength="20" autocomplete="username" placeholder="输入用户名" />
            </label>
            <label>
              头像
              <input id="avatarInput" type="file" accept="image/*" />
            </label>
            <button id="saveProfileBtn" class="btn primary" type="button">保存</button>
          </div>
          <p id="profileStatus" class="profile-status" aria-live="polite"></p>
        </div>
      </section>
    </div>

    <section class="card week-card">
      <div class="row-between">
        <h2>本周工作日</h2>
        <small id="weekRange"></small>
      </div>
      <div id="weekList" class="week-list"></div>
    </section>
  </main>

  <div id="dogCelebration" class="dog-celebration" aria-live="polite" aria-atomic="true" hidden>
    <div class="dog-card" role="status">
      <span class="dog-sparkle dog-sparkle-one" aria-hidden="true">✦</span>
      <span class="dog-sparkle dog-sparkle-two" aria-hidden="true">♥</span>
      <span class="dog-expression-mark" aria-hidden="true">💢</span>
      <div class="dog-mascot" aria-hidden="true">
        <span class="dog-ear dog-ear-left"></span>
        <span class="dog-ear dog-ear-right"></span>
        <div class="dog-head">
          <span class="dog-spot"></span>
          <span class="dog-eye dog-eye-left"></span>
          <span class="dog-eye dog-eye-right"></span>
          <span class="dog-cheek dog-cheek-left"></span>
          <span class="dog-cheek dog-cheek-right"></span>
          <span class="dog-muzzle">
            <span class="dog-nose"></span>
            <span class="dog-mouth"></span>
            <span class="dog-tongue"></span>
          </span>
        </div>
        <span class="dog-paw dog-paw-left"></span>
        <span class="dog-paw dog-paw-right"></span>
      </div>
      <p id="dogMessage" class="dog-message"></p>
    </div>
  </div>

  <template id="dayTemplate">
    <article class="day-item">
      <div>
        <h3 class="day-title"></h3>
        <p class="day-subtitle"></p>
      </div>
      <div class="day-right">
        <div class="check-columns">
          <div class="check-column">
            <button class="btn lunch-btn">我要一起吃饭</button>
            <div class="checkin-users lunch-users"></div>
          </div>
          <div class="check-column">
            <button class="btn busy-btn">我有约啦</button>
            <div class="checkin-users busy-users"></div>
          </div>
          <div class="check-column">
            <button class="btn vacation-btn">我休假啦</button>
            <div class="checkin-users vacation-users"></div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js?v=20260722-3"></script>
</body>
</html>
